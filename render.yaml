services:
  - type: web
    name: prisoners-dilemma
    runtime: node
    buildCommand: npm install && cd server && npm install && cd ../client && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: 3001
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: bebulat/claude_prisoners_dilemma
